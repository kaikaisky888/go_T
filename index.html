<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>正在连接...</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="wrap">
        <div class="card">
            <div class="brand">
                <div class="brand-name" id="brandName">正在连接...</div>
            </div>
            <div id="mainContent">
                <div class="spinner-wrap" id="spinnerWrap">
                    <div class="spinner"></div>
                </div>
                <div class="status-text" id="statusText">正在连接...</div>
                <ul class="lines" id="lineList"></ul>
                <div class="actions hide" id="mainActions">
                    <button class="btn btn-secondary" id="cancelBtn">取消自动跳转</button>
                </div>
            </div>
            <div id="fallbackContent" class="hide">
                <div class="fallback-icon">⚠️</div>
                <div class="fallback-title">线路检测失败</div>
                <div class="fallback-desc">所有线路均不可用，请稍后重试或通过以下方式获取最新地址。</div>
                <div class="actions">
                    <button class="btn btn-primary" onclick="location.reload()">重新检测</button>
                </div>
                <div class="contact-links" id="contactLinks"></div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
